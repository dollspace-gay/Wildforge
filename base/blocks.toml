# Vanilla blocks — registered through the same data path external mods use.
# Textures prefixed with @ reference built-in procedural tiles.

[[block]]
id = "grass"
name = "Grass"
texture = { top = "@grass_top", side = "@grass_side", bottom = "@dirt" }
hardness = 0.75
tool = "shovel"
drops = "base:dirt"

[[block]]
id = "dirt"
name = "Dirt"
texture = "@dirt"
hardness = 0.6
