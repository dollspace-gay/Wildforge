# Item groups usable in recipes as "#base:planks" etc.
# Mods can extend these from their own tags.toml.

[[tag]]
id = "planks"
items = [
  "base:planks",
  "base:birch_planks",
  "base:spruce_planks",
  "base:jungle_planks",
  "base:acacia_planks",
]

[[tag]]
id = "logs"
items = [
  "base:log",
  "base:birch_log",
  "base:spruce_log",
  "base:jungle_log",
  "base:acacia_log",
]

[[tag]]
id = "meats"
items = [
  "base:raw_venison",
  "base:raw_boar",
  "base:raw_chevon",
  "base:raw_fowl",
  "base:raw_rabbit",
]

[[tag]]
id = "hides"
items = ["base:hide"]

[[tag]]
id = "raw_meats"
items = [
  "base:raw_venison",
  "base:raw_boar",
  "base:raw_chevon",
  "base:raw_fowl",
  "base:raw_rabbit",
]

[[tag]]
id = "pickling_veg"
items = [
  "base:carrot",
  "base:potato",
  "base:mushroom",
]
