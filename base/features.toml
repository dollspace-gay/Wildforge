# Ore distribution (minerals & geology): every deposit names its
# host rock, so where you dig finally matters. Order matters once:
# quartz veins plant before the gold that lives inside them.

# -- the bronze age stays findable: copper broad, tin generous --

[[feature]]
type = "ore"
block = "base:copper_ore"
replaces = "base:stone"
vein_size = 7
per_chunk = 6
y_range = [8, 72]

# Porphyry copper: volcanic country runs rich.
[[feature]]
type = "ore"
block = "base:copper_ore"
replaces = "base:basalt"
vein_size = 6
per_chunk = 4
y_range = [2, 200]

