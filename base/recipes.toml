# A diamond tips a steel pick: the one tier-6 gate.
[[recipe]]
pattern = ["d", "p"]
keys = { d = "base:diamond", p = "base:steel_pickaxe" }
output = "base:diamond_tipped_pick"

# Coal: found fuel, and the bloomery accepts it beside charcoal.
[[fuel]]
item = "base:coal"
burn = 25.0
speed = 1.25

[[bloomery]]
charge = "base:iron_ingot"
fuel = "base:coal"
bloom = "base:steel_bloom"

# The forge: the first workshop. A building, not a block - the mouth
# wants the bloomery's firebrick stack, three more courses of chimney,
# and a stone anvil beside it before it fires (economy plan, leg 2).
[[recipe]]
pattern = ["i.i", "fff", "fff"]
keys = { i = "base:iron_ingot", f = "base:firebrick" }
output = "base:forge"

# The prospector's pick: a bronze instrument, not a mining tool.
# Strike bare rock and it reads the country - granite provinces,
# volcanic fields, blue ground - knowledge being the one good a
# surveyor can sell without swinging at anything (economy plan).
[[recipe]]
pattern = ["bb.", ".t.", ".t."]
keys = { b = "base:bronze_ingot", t = "base:stick" }
output = "base:prospect_pick"

# Salting: the first preservation chain (economy plan, leg 3). Any
# raw meat packed in salt keeps twelve days where fresh keeps a day
# and a half - and salt country earns a trade identity.
[[recipe]]
pattern = ["m", "s"]
keys = { m = "#base:raw_meats", s = "base:salt_crystal" }
output = "base:salted_meat"
count = 1
