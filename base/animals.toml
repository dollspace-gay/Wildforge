# Biome-native wildlife. Sizes/offsets in px (16 px = 1 block); a box
# named "leg" is mirrored into four legs at (+-x, y, +-z).

[[animal]]
id = "deer"
name = "Deer"
biomes = ["forest"]
health = 10
speed = 2.4
flee_range = 10
group = [1, 3]
rarity = 5
tex = "@deer"
head_tex = "@deer_face"
sound_pitch = 1.0
drops = [
  { item = "raw_venison", min = 1, max = 2 },
  { item = "hide", min = 0, max = 1 },
]
[animal.model]
body = { size = [6, 7, 11], at = [0, 9, 0] }
head = { size = [4, 4, 5], at = [0, 14, -7] }
leg = { size = [2, 9, 2], at = [2, 0, 4] }
ear_l = { size = [1, 2, 1], at = [-2, 18, -7] }
ear_r = { size = [1, 2, 1], at = [2, 18, -7] }
tail = { size = [1, 2, 1], at = [0, 12, 6] }

